name: Refresh Dashboard Data
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch Retell data
        env:
          RETELL_API_KEY: ${{ secrets.RETELL_API_KEY }}
        run: python tools/fetch_retell_data.py --client=Budget
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "🔄 Auto-refresh data"
          git push
