name: Refresh Dashboard Data

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Retell data
        env:
          RETELL_API_KEY: ${{ secrets.RETELL_API_KEY }}
        run: python tools/fetch_retell_data.py --client=Budget

      - name: Fetch Google Sheets data
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          if [ -n "$GOOGLE_SHEET_ID" ]; then
            python tools/fetch_sheets.py
          else
            echo "No GOOGLE_SHEET_ID set, skipping sheets fetch"
          fi

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "🔄 Auto-refresh dashboard data"
          git push
